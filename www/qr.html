<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR installation runner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
 html,body{margin:0;background:#0b0f16;color:#e7edf5;height:100%;
   font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
 .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center}
 h1{margin:0;font-size:26px}
 #qr{background:#fff;padding:16px;border-radius:16px}
 #qr img,#qr canvas{display:block}
 p{max-width:420px;color:#8aa0b6;line-height:1.5;margin:0}
 .url{max-width:520px;word-break:break-all;font-size:12px;color:#5a687a}
 .step{font-size:15px;color:#e7edf5}
</style>
</head>
<body>
 <div class="wrap">
   <h1 id="name">Runner</h1>
   <div id="qr"></div>
   <div class="step">1. Scanne ce code avec l'appareil photo du téléphone.<br>2. Ouvre le lien, autorise la localisation + les notifications.<br>3. « Partager » → « Sur l'écran d'accueil ».</div>
   <p>Chaque runner a son propre code : il arrive dans l'app déjà identifié.</p>
   <div class="url" id="url"></div>
 </div>
<script>
 const q = new URLSearchParams(location.search);
 const text = q.get('text') || location.origin + '/';
 document.getElementById('name').textContent = q.get('name') || 'Runner';
 document.getElementById('url').textContent = text;
 new QRCode(document.getElementById('qr'), { text, width:300, height:300, correctLevel: QRCode.CorrectLevel.M });
</script>
</body>
</html>
