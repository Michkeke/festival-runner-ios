# Cloud macOS build of the Festival Runner iOS app — no Mac needed.
# Signature EXPLICITE : app-store-connect fetch-signing-files --create
# crée le certificat de distribution + le provisioning profile s'ils manquent.
workflows:
  ios-testflight:
    name: Festival Runner iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: "APP IOS"             # <- nom exact de la clé App Store Connect dans Codemagic
    environment:
      vars:
        BUNDLE_ID: "ch.festival.runner"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS deps
        script: npm ci || npm install
      - name: Generate app icons / splash
        script: npx @capacitor/assets generate --ios || true
      - name: Add + sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
          # AppDelegate avec le relais du token APNs (le template Capacitor ne l'a pas)
          cp ios-overrides/AppDelegate.swift ios/App/App/AppDelegate.swift
          echo "AppDelegate.swift remplace (relais push APNs)"
      - name: Info.plist + entitlements (localisation fond, push APNs, chiffrement)
        script: |
          PLIST="ios/App/App/Info.plist"
          plutil -replace NSLocationWhenInUseUsageDescription -string "Festival Runner utilise votre position pour la partager en temps reel avec votre responsable pendant vos missions." "$PLIST"
          plutil -replace NSLocationAlwaysAndWhenInUseUsageDescription -string "Festival Runner partage votre position en continu, meme ecran verrouille, avec votre responsable pendant votre service." "$PLIST"
          plutil -replace UIBackgroundModes -json '["location"]' "$PLIST"
          plutil -replace ITSAppUsesNonExemptEncryption -bool NO "$PLIST"
          # Entitlement push APNs (production) + liaison a la cible App du projet Xcode
          printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' '<plist version="1.0"><dict><key>aps-environment</key><string>production</string></dict></plist>' > ios/App/App/App.entitlements
          sed -i '' 's#\(PRODUCT_BUNDLE_IDENTIFIER = ch.festival.runner;\)#\1 CODE_SIGN_ENTITLEMENTS = App/App.entitlements;#g' ios/App/App.xcodeproj/project.pbxproj
          plutil -p "$PLIST" | grep -E "NSLocation|UIBackgroundModes|ITSApp" || true
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Regenere profil + certificat App Store (capability Push)
        script: |
          # Les profils App Store crees aux builds precedents (avant l'activation de
          # Push sur l'App ID) n'ont PAS la capability Push -> fetch-signing-files les
          # reutilise et la signature echoue. On les supprime pour qu'un profil NEUF
          # (incluant Push) soit regenere. Requiert Push active sur l'App ID ch.festival.runner.
          echo "=== DEBUG: profils App Store existants avant suppression ==="
          app-store-connect profiles list --type IOS_APP_STORE --json || echo "(list a echoue)"
          echo "=== FIN DEBUG ==="
          for PID in $(app-store-connect profiles list --type IOS_APP_STORE --json 2>/dev/null | jq -r '(if type=="object" then .data else . end)[].id'); do
            echo "Suppression du profil perime $PID"
            app-store-connect profiles delete "$PID" || true
          done
          # Purge des certificats de distribution : on en cree un neuf a chaque build
          # (cle privee fraiche), donc on revoque les anciens pour rester sous la limite Apple.
          for T in DISTRIBUTION IOS_DISTRIBUTION; do
            for CID in $(app-store-connect certificates list --type $T --json 2>/dev/null | jq -r '(if type=="object" then .data else . end)[].id'); do
              echo "Revocation du certificat $CID ($T)"
              app-store-connect certificates delete "$CID" || true
            done
          done
      - name: Set up code signing
        script: |
          keychain initialize
          # Genere une cle privee fraiche puis cree un NOUVEAU certificat de
          # distribution (l'API ne peut pas recuperer la cle privee d'un
          # certificat existant -> sinon "Cannot save Signing Certificates").
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
          echo "=== DEBUG: entitlements des profils recuperes ==="
          for p in "$HOME/Library/MobileDevice/Provisioning Profiles"/*.mobileprovision; do
            [ -e "$p" ] || { echo "(aucun profil telecharge)"; break; }
            security cms -D -i "$p" > /tmp/pp.plist 2>/dev/null
            NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/pp.plist 2>/dev/null)
            if /usr/libexec/PlistBuddy -c 'Print :Entitlements:aps-environment' /tmp/pp.plist >/dev/null 2>&1; then
              echo "  [$NAME] -> aps-environment PRESENT ✓"
            else
              echo "  [$NAME] -> PAS d'aps-environment ✗"
            fi
          done
          echo "=== FIN DEBUG ==="
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
