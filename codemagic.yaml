# Cloud macOS build of the Festival Runner iOS app — no Mac needed.
# Signature EXPLICITE : app-store-connect fetch-signing-files --create
# crée le certificat de distribution + le provisioning profile s'ils manquent.
workflows:
  ios-testflight:
    name: Festival Runner iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: "APP IOS"             # <- nom exact de la clé App Store Connect dans Codemagic
    environment:
      vars:
        BUNDLE_ID: "ch.festival.runner"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS deps
        script: npm ci || npm install
      - name: Generate app icons / splash
        script: npx @capacitor/assets generate --ios || true
      - name: Add + sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
