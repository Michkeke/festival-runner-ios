# Cloud macOS build of the Festival Runner iOS app — no Mac needed.
# In Codemagic: add your App Store Connect API key (Team integrations) and reference it below.
workflows:
  ios-testflight:
    name: Festival Runner iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: FestivalRunnerASC     # <- name of the App Store Connect API key you add in Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ch.festival.runner   # <- must match the App ID you register in the Apple portal
      vars:
        APP_STORE_APPLE_ID: 0000000000           # <- your app's Apple ID from App Store Connect (fill after Phase 4)
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS deps
        script: npm ci || npm install
      - name: Generate app icons / splash
        script: npx @capacitor/assets generate --ios || true
      - name: Add + sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build signed IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
